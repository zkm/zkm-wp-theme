name: Release WordPress Theme

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (example: v1.0.2)'
        required: true

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    env:
      THEME_SLUG: zkm-wp-theme
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build theme zip
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(grep -m1 '^Version:' style.css | sed 's/^Version:[[:space:]]*//')"
          if [[ -z "${VERSION}" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi

          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ inputs.tag_name }}"
          fi

          mkdir -p dist/${THEME_SLUG}

          rsync -a ./ dist/${THEME_SLUG}/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude '.env' \
            --exclude '.env.example' \
            --exclude 'docker-compose.yml'

          (cd dist && zip -r "${THEME_SLUG}-${VERSION}.zip" "${THEME_SLUG}")

          echo "asset_path=dist/${THEME_SLUG}-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "asset_name=${THEME_SLUG}-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.release_tag }}
          name: ${{ steps.package.outputs.release_tag }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.asset_path }}
